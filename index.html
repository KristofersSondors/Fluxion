<!doctype html>
<html lang="lv">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Lumen - Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; background: #0E0E10; min-height: 100%; }
    body {
      font-family: "Inter", "Gibson", "IBM Plex Sans", "Aptos", system-ui, sans-serif;
      display: grid; place-items: center; padding: 32px 12px;
      box-sizing: border-box;
    }
    *, *::before, *::after { box-sizing: border-box; }
    * { -webkit-font-smoothing: antialiased; }
    button:focus-visible,
    input:focus-visible,
    select:focus-visible {
      outline: 3px solid rgba(15, 88, 79, 0.35);
      outline-offset: 3px;
    }
    button {
      font: inherit;
    }
    .fluxion-range {
      --range-fill: 0%;
      appearance: none;
      -webkit-appearance: none;
      width: 100%;
      height: 24px;
      margin: 0 0 20px;
      cursor: pointer;
      background: transparent;
    }
    .fluxion-range::-webkit-slider-runnable-track {
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, #FBEA3B 0 var(--range-fill), #E5E7EB var(--range-fill) 100%);
    }
    .fluxion-range::-webkit-slider-thumb {
      appearance: none;
      -webkit-appearance: none;
      width: 24px;
      height: 24px;
      margin-top: -10px;
      border-radius: 50%;
      border: 2px solid #fff;
      background: #FBEA3B;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
    }
    .fluxion-range:hover::-webkit-slider-thumb {
      background: #FBEA3B;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
    }
    .fluxion-range::-moz-range-track {
      height: 4px;
      border-radius: 999px;
      background: #E5E7EB;
    }
    .fluxion-range::-moz-range-progress {
      height: 4px;
      border-radius: 999px;
      background: #FBEA3B;
    }
    .fluxion-range::-moz-range-thumb {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid #fff;
      background: #FBEA3B;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
    }
    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }
    /* Tweaks panel */
    .tweaks {
      position: fixed; right: 20px; bottom: 20px; z-index: 50;
      background: #17181C; color: #fff; border-radius: 14px;
      padding: 14px 16px; font-family: "Inter", "Gibson", "IBM Plex Sans", "Aptos", system-ui, sans-serif; font-size: 13px;
      border: 1px solid #2A2B31; width: 240px;
      display: none;
    }
    .tweaks.open { display: block; }
    .tweaks h3 { margin: 0 0 10px; font-size: 12px; letter-spacing: 1.5px;
                 text-transform: uppercase; color: #9A9BA3; font-weight: 600; }
    .tweaks label { display: block; margin-top: 10px; color: #C7C8CF; }
    .tweaks select, .tweaks input[type="color"] {
      width: 100%; margin-top: 4px; background: #0E0E10; color: #fff;
      border: 1px solid #2A2B31; border-radius: 8px; padding: 6px 8px;
      font: inherit;
    }
    @media (max-width: 430px) {
      body { padding: 0; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <div id="tweaksPanel" class="tweaks">
    <h3>Tweaks</h3>
    <label>Promo card
      <select id="tw-promo">
        <option value="auto">Auto (carousel)</option>
        <option value="indigo">Round-ups / indigo</option>
        <option value="cashback">Cashback / ink</option>
        <option value="goal">Savings goal / lilac</option>
      </select>
    </label>
    <label>Accent color
      <input id="tw-accent" type="color" value="#F2D23A"/>
    </label>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="app.bundle.js"></script>
</body>
</html>
